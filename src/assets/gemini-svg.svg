<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <linearGradient id="techBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A192F" />
      <stop offset="100%" stop-color="#172A45" />
    </linearGradient>

    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="100%" stop-color="#60EFFF" />
    </linearGradient>
    
    <linearGradient id="signalGlow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00FF87" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#60EFFF" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 0)">
    <path d="M 190,70 A 90,90 0 0,1 190,230" fill="none" stroke="url(#signalGlow)" stroke-width="8" stroke-linecap="round" />
    <path d="M 215,95 A 60,60 0 0,1 215,205" fill="none" stroke="url(#signalGlow)" stroke-width="6" stroke-linecap="round" />

    <circle cx="120" cy="150" r="80" fill="url(#techBlue)" stroke="#306EE8" stroke-width="2" />

    <polygon points="120,105 145,120 145,150 120,165 95,150 95,120" fill="none" stroke="#233554" stroke-width="3" />
    <line x1="120" y1="105" x2="120" y2="70" stroke="#233554" stroke-width="3" />
    <line x1="145" y1="150" x2="175" y2="165" stroke="#233554" stroke-width="3" />
    <line x1="95" y1="150" x2="65" y2="165" stroke="#233554" stroke-width="3" />
    <line x1="145" y1="120" x2="175" y2="105" stroke="#233554" stroke-width="3" />
    <line x1="95" y1="120" x2="65" y2="105" stroke="#233554" stroke-width="3" />
    <line x1="120" y1="165" x2="120" y2="200" stroke="#233554" stroke-width="3" />

    <polygon points="105,115 150,150 105,185" fill="url(#neonGreen)" />
  </g>

  <g transform="translate(260, 0)">
    <text x="0" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="900" fill="#FFFFFF" letter-spacing="2">
      SOCCER<tspan fill="url(#neonGreen)">LIVE</tspan>
    </text>
    
    <text x="5" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#8892B0" letter-spacing="8">
      STREAMING NETWORK
    </text>
  </g>
